<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mamma Tomato — Iniciar Sesión</title>
  <meta name="description" content="Sistema de gestión ERP para Mamma Tomato Pizza & Focaccia">
  <link rel="icon" href="assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <section class="login-view">
    <div class="login-card fade-in">
      <div class="panel-left">
        <span>ERP logistic</span>
        <h1>Gestión de ventas e inventario</h1>
        <span>Sistema personalizado para operaciones comerciales y control de stock</span>
        <img src="assets/logo.png" class="login-logo" alt="Mamma Tomato">
        <span><br>Impletado para Mamma Tomato Pizza & Focaccia</span>
        <p>Desarrollado por SOFUTP</p>
      </div>
      <div class="panel-right">
      <div class="login-heading">
        <h2>Iniciar sesión</h2>
      </div>

      <form id="loginForm" novalidate>
         
        <div class="form-group">
          <label>Usuario</label>
          <div class="input-icon">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="loginUser" class="form-control" placeholder="Ingrese su usuario">
          </div>
          <div class="login-field-error" id="loginUserError"></div>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <div class="input-icon">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="loginPass" class="form-control" placeholder="Ingrese su contraseña">
          </div>
          <div class="login-field-error" id="loginPassError"></div>
        </div>
        <div id="loginError" class="form-error hidden"><i class="fa-solid fa-circle-exclamation"></i> Credenciales inválidas</div>
        <button type="submit" class="btn btn-primary btn-block btn-lg"><i class="fa-solid fa-right-to-bracket"></i> Iniciar sesión</button>
        <div class="icon-login-sec"><i class="fa-solid fa-shield-halved"></i><span>Solo personal autorizado</span>
        </div>
      </form>
      </div>
    </div>
  </section>
  <script src="js/db.js"></script>
  <script>
    const ROLE_DEFAULT = { admin: 'pages/dashboard.html', cajero: 'pages/pos.html', cocina: 'pages/cocina.html' };

    document.addEventListener('DOMContentLoaded', async () => {
      await initDB();
      const s = JSON.parse(sessionStorage.getItem('mt_session'));
      if (s) { window.location.href = ROLE_DEFAULT[s.rol] || 'pages/dashboard.html'; return; }

      const form = document.getElementById('loginForm');

      form.addEventListener('submit', async e => {
        e.preventDefault();

        const userField = document.getElementById('loginUser');
        const passField = document.getElementById('loginPass');
        const userError = document.getElementById('loginUserError');
        const passError = document.getElementById('loginPassError');
        const loginError = document.getElementById('loginError');
        let valid = true;

        userField.classList.remove('is-invalid');
        passField.classList.remove('is-invalid');
        userError.textContent = '';
        passError.textContent = '';
        loginError.classList.add('hidden');

        const user = userField.value.trim().toLowerCase();
        const pass = passField.value;

        if (!user) {
          userField.classList.add('is-invalid');
          userError.textContent = 'Ingrese su usuario';
          valid = false;
        } else if (user.length < 3) {
          userField.classList.add('is-invalid');
          userError.textContent = 'Mínimo 3 caracteres';
          valid = false;
        }

        if (!pass) {
          passField.classList.add('is-invalid');
          passError.textContent = 'Ingrese su contraseña';
          valid = false;
        } else if (pass.length < 4) {
          passField.classList.add('is-invalid');
          passError.textContent = 'Mínimo 4 caracteres';
          valid = false;
        }

        if (!valid) return;

        const usuarios = await dbGetAll('usuarios');
        const found = usuarios.find(u => u.username === user && u.password === pass && u.estado === 'activo');

        if (!found) {
          loginError.classList.remove('hidden');
          return;
        }

        sessionStorage.setItem('mt_session', JSON.stringify({
          id: found.id, username: found.username, rol: found.rol,
          nombre: found.nombre, codigo: found.codigo || ''
        }));
        window.location.href = ROLE_DEFAULT[found.rol] || 'pages/dashboard.html';
      });

      document.getElementById('loginUser').addEventListener('input', () => {
        document.getElementById('loginUser').classList.remove('is-invalid');
        document.getElementById('loginUserError').textContent = '';
        document.getElementById('loginError').classList.add('hidden');
      });
      document.getElementById('loginPass').addEventListener('input', () => {
        document.getElementById('loginPass').classList.remove('is-invalid');
        document.getElementById('loginPassError').textContent = '';
        document.getElementById('loginError').classList.add('hidden');
      });
    });
  </script>
</body>
</html>
