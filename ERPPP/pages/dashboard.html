<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mamma Tomato — Dashboard</title>
  <link rel="icon" href="../assets/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <div id="app"></div>

  <template id="tplDashboard">
    <div class="row g-3 mb-3 fade-in" id="dashStats"></div>
    <div class="row g-3 fade-in delay-1">
      <div class="col-lg-6">
        <div class="card">
          <div class="card-header"><h6 class="mb-0">Pedidos recientes</h6></div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr><th class="small text-uppercase text-muted">ID</th><th class="small text-uppercase text-muted">Fecha</th><th class="small text-uppercase text-muted">Cliente</th><th class="small text-uppercase text-muted">Total</th><th class="small text-uppercase text-muted">Estado</th></tr>
                </thead>
                <tbody id="dashPedidosBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center">
            <h6 class="mb-0">Alertas de inventario</h6>
            <span class="badge text-bg-warning">Revisar</span>
          </div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr><th class="small text-uppercase text-muted">Insumo</th><th class="small text-uppercase text-muted">Stock</th><th class="small text-uppercase text-muted">Mínimo</th><th class="small text-uppercase text-muted">Estado</th></tr>
                </thead>
                <tbody id="dashInvBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </template>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/templates.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/dashboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await initDB();
      const s = requireAuth('dashboard');
      if (!s) return;
      buildLayout(s, 'dashboard');
      renderDashboard();
    });
  </script>
</body>
</html>
