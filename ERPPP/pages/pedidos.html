<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mamma Tomato — Pedidos</title>
  <link rel="icon" href="../assets/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <div id="app"></div>

  <template id="tplPedidos">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
        <h6 class="mb-0">Gestión de Pedidos</h6>
        <div class="d-flex gap-2 flex-wrap">
          <input type="date" id="pedFecha" class="form-control form-control-sm" style="width:auto">
          <select id="pedEstado" class="form-select form-select-sm" style="width:auto">
            <option value="">Todos</option>
            <option value="pendiente">Pendiente</option>
            <option value="preparando">Preparando</option>
            <option value="entregado">Entregado</option>
            <option value="anulado">Anulado</option>
          </select>
          <button class="btn btn-brand btn-sm" id="btnFiltrar"><i class="fa-solid fa-filter"></i> Filtrar</button>
        </div>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th class="small text-uppercase text-muted">ID</th>
                <th class="small text-uppercase text-muted">Fecha</th>
                <th class="small text-uppercase text-muted">Cliente</th>
                <th class="small text-uppercase text-muted">Mesa</th>
                <th class="small text-uppercase text-muted">Cajero</th>
                <th class="small text-uppercase text-muted">Pago</th>
                <th class="small text-uppercase text-muted">Total</th>
                <th class="small text-uppercase text-muted">Estado</th>
                <th class="small text-uppercase text-muted">Acciones</th>
              </tr>
            </thead>
            <tbody id="pedidosBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </template>

  <!-- Modal: Detalle de pedido -->
  <div class="modal fade" id="modalDetallePedido" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h6 class="modal-title" id="detallePedidoTitle"></h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="detallePedidoBody"></div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/templates.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/pedidos.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await initDB();
      const s = requireAuth('pedidos');
      if (!s) return;
      buildLayout(s, 'pedidos');
      renderPedidos();
    });
  </script>
</body>
</html>
